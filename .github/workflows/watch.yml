name: tweet-watcher

on:
  schedule:
    # Every 10 minutes. NOTE: GitHub schedules are best-effort and can be
    # delayed by several minutes under load (especially on the free tier).
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Allow the workflow to commit the updated state file back to the repo.
permissions:
  contents: write

# Never run two instances at once (they'd fight over state/seen.json).
concurrency:
  group: tweet-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
          STATE_SALT: ${{ secrets.STATE_SALT }}
        run: node src/scrape.mjs

      - name: Persist state
        run: |
          git config user.name "tweet-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update seen state [skip ci]"
            # Retry-safe push in case anything else moved the branch.
            git pull --rebase --autostash || true
            git push || echo "push failed (state will be re-derived next run)"
          fi
